apiVersion: apps/v1
kind: Deployment

metadata:
  name: nextjs-app
  namespace: production

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nextjs-app

  template:
    metadata:
      labels:
        app: nextjs-app

    spec:
      containers:
        - name: nextjs-app
          image: yatogamidev/nextjs-app:latest

          ports:
            - containerPort: 3000

    env:
      - name: NEXT_PUBLIC_SUPABASE_URL
        valueFrom:
          secretKeyRef:
            name: nextjs-secret
            key: NEXT_PUBLIC_SUPABASE_URL

      - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
        valueFrom:
          secretKeyRef:
            name: nextjs-secret
            key: NEXT_PUBLIC_SUPABASE_ANON_KEY

          env:
            - name: NODE_ENV
              value: production

          imagePullPolicy: Always

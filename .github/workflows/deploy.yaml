name: Deploy to K3s

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest
            ${{ secrets.DOCKER_USERNAME }}/nextjs-app:${{ github.sha }}

      # 5. SSH into EC2 and deploy with Helm
      - name: Deploy to K3s via Helm
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Set kubeconfig
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest

            # Deploy or upgrade with Helm
            helm upgrade --install nextjs-app ~/helm/nextjs-app \
              --set image.repository=${{ secrets.DOCKER_USERNAME }}/nextjs-app \
              --set image.tag=${{ github.sha }} \
              --set image.pullPolicy=Always \
              --wait \
              --timeout 5m

            # Verify deployment
            kubectl rollout status deployment/nextjs-app

            # Show running pods
            kubectl get pods
